<!doctype html>
<html>
<head>
    <title>RT Patient Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app"></div>

<section class="settings-panel">

    <h2>System Integrations</h2>

    <input id="smtp-host" placeholder="SMTP Host">

    <input id="smtp-user" placeholder="SMTP User">

    <input id="smtp-password" type="password" placeholder="SMTP Password">

    <input id="google-client" placeholder="Google Client ID">

    <input id="google-secret" type="password" placeholder="Google Secret">

    <button onclick="saveSettings()">
        Save Settings
    </button>

</section>

<script src="app.js"></script>
<script src="settings.js"></script>

</body>
</html>
